<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Birthday 4K</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#text{
position:absolute;
width:100%;
top:40%;
text-align:center;
color:white;
font-size:70px;
letter-spacing:8px;
text-shadow:0 0 20px white,0 0 40px #88aaff,0 0 80px #4455ff;
transition:opacity 2s;
}

#cake{
position:absolute;
width:100%;
bottom:15%;
text-align:center;
font-size:80px;
opacity:0;
transition:opacity 2s;
}
</style>
</head>

<body>

<div id="text"></div>
<div id="cake">🎂</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
3000
)

camera.position.z = 250

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2))
document.body.appendChild(renderer.domElement)

const starCount = 20000
const positions = []
const geometry = new THREE.BufferGeometry()

for(let i=0;i<starCount;i++){

let radius = Math.random()*1200
let angle = Math.random()*Math.PI*2
let height = (Math.random()-0.5)*100

let x = Math.cos(angle)*radius
let y = height
let z = Math.sin(angle)*radius

positions.push(x,y,z)

}

geometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

const stars = new THREE.Points(geometry,material)

scene.add(stars)

const blackHoleGeo = new THREE.SphereGeometry(15,64,64)
const blackHoleMat = new THREE.MeshBasicMaterial({color:0x000000})
const blackHole = new THREE.Mesh(blackHoleGeo,blackHoleMat)
scene.add(blackHole)

const ringGeo = new THREE.RingGeometry(25,60,128)
const ringMat = new THREE.MeshBasicMaterial({
color:0x6633ff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.8
})

const ring = new THREE.Mesh(ringGeo,ringMat)
ring.rotation.x = Math.PI/2
scene.add(ring)

let time = 0

function animate(){

requestAnimationFrame(animate)

time += 0.002

stars.rotation.y += 0.0005
ring.rotation.z += 0.01

camera.position.x = Math.sin(time)*40
camera.position.z = 250 + Math.cos(time)*20

camera.lookAt(0,0,0)

renderer.render(scene,camera)

}

animate()

setTimeout(()=>{

document.getElementById("text").innerHTML =
"HAPPY BIRTHDAY"

},5000)

setTimeout(()=>{

document.getElementById("text").innerHTML =
"HAPPY BIRTHDAY Lita"

},9000)

setTimeout(()=>{

document.getElementById("cake").style.opacity = 1

},13000)

</script>

</body>
</html>
