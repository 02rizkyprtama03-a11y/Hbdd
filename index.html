<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Birthday</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#title{
position:absolute;
width:100%;
top:40%;
text-align:center;
color:white;
font-size:70px;
letter-spacing:10px;
text-shadow:0 0 20px #fff,0 0 40px #88aaff,0 0 80px #4455ff;
opacity:0;
transition:opacity 2s;
}

#cake{
position:absolute;
width:100%;
bottom:15%;
text-align:center;
font-size:100px;
opacity:0;
transition:opacity 2s;
}
</style>
</head>

<body>

<div id="title">HAPPY BIRTHDAY</div>
<div id="cake">🎂</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
)

camera.position.z = 300

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2))
document.body.appendChild(renderer.domElement)

const starCount = 100000
const geometry = new THREE.BufferGeometry()
const positions = []

for(let i=0;i<starCount;i++){

let radius = Math.random()*1500
let branch = i % 4
let angle = radius*0.02 + branch*Math.PI*0.5
let spin = radius*0.002

let x = Math.cos(angle+spin)*radius
let y = (Math.random()-0.5)*50
let z = Math.sin(angle+spin)*radius

positions.push(x,y,z)

}

geometry.setAttribute(
"position",
new THREE.Float32BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

const stars = new THREE.Points(geometry,material)
scene.add(stars)

const blackHoleGeo = new THREE.SphereGeometry(20,64,64)
const blackHoleMat = new THREE.MeshBasicMaterial({color:0x000000})
const blackHole = new THREE.Mesh(blackHoleGeo,blackHoleMat)
scene.add(blackHole)

const ringGeo = new THREE.RingGeometry(30,80,128)
const ringMat = new THREE.MeshBasicMaterial({
color:0x5533ff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.8
})

const ring = new THREE.Mesh(ringGeo,ringMat)
ring.rotation.x = Math.PI/2
scene.add(ring)

let t = 0

function animate(){

requestAnimationFrame(animate)

t += 0.002

stars.rotation.y += 0.0003
ring.rotation.z += 0.01

camera.position.x = Math.sin(t)*80
camera.position.z = 300 + Math.cos(t)*50

camera.lookAt(0,0,0)

renderer.render(scene,camera)

}

animate()

setTimeout(()=>{
document.getElementById("title").style.opacity = 1
},5000)

setTimeout(()=>{
document.getElementById("cake").style.opacity = 1
},9000)

</script>

</body>
</html>
