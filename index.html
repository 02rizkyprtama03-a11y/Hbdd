<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Space</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let centerX = canvas.width/2;
let centerY = canvas.height/2;

const text = "HAPPY BIRTHDAY";
const fontSize = 120;

const offCanvas = document.createElement("canvas");
const offCtx = offCanvas.getContext("2d");

offCanvas.width = canvas.width;
offCanvas.height = canvas.height;

offCtx.fillStyle="white";
offCtx.font = fontSize+"px Arial";
offCtx.textAlign="center";
offCtx.fillText(text, offCanvas.width/2, offCanvas.height/2);

const imageData = offCtx.getImageData(0,0,offCanvas.width,offCanvas.height);

for(let y=0;y<imageData.height;y+=6){
    for(let x=0;x<imageData.width;x+=6){
        const index=(y*imageData.width+x)*4;
        if(imageData.data[index+3]>128){
            stars.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height,
                targetX:x,
                targetY:y,
                angle:Math.random()*Math.PI*2,
                radius:Math.random()*300+50,
                speed:0.01+Math.random()*0.02
            });
        }
    }
}

let forming=false;

setInterval(()=>{
    forming=!forming;
},4000);

function drawBlackHole(){
    let grad = ctx.createRadialGradient(centerX,centerY,10,centerX,centerY,120);
    grad.addColorStop(0,"black");
    grad.addColorStop(0.3,"purple");
    grad.addColorStop(1,"transparent");

    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(centerX,centerY,120,0,Math.PI*2);
    ctx.fill();
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawBlackHole();

    stars.forEach(star=>{
        if(forming){
            star.x += (star.targetX-star.x)*0.05;
            star.y += (star.targetY-star.y)*0.05;
        }else{
            star.angle += star.speed;
            star.x = centerX + Math.cos(star.angle)*star.radius;
            star.y = centerY + Math.sin(star.angle)*star.radius;
        }

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(star.x,star.y,1.5,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
